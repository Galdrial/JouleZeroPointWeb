services:
  backend:
    build:
      context: ./backend
    container_name: joule-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5174
    depends_on:
      - mongodb
    networks:
      - joule-network

  frontend:
    build:
      context: ./frontend
    container_name: joule-frontend
    restart: unless-stopped
    ports:
      - "5174:80" # Maps local port 5174 to Nginx port 80
    networks:
      - joule-network
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    container_name: joule-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017" # Localhost only for security
    volumes:
      - mongo-data:/data/db
    networks:
      - joule-network

networks:
  joule-network:
    driver: bridge

volumes:
  mongo-data:
