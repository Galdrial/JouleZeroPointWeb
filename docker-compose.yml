services:
  backend:
    build:
      context: ./backend
    container_name: joule-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5174
    depends_on:
      - mongodb
    networks:
      - joule-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: joule-frontend
    restart: unless-stopped
    ports:
      - "5174:80" # Maps local port 5174 to Nginx port 80
    networks:
      - joule-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:latest
    container_name: joule-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017" # Localhost only for security
    volumes:
      - mongo-data:/data/db
    networks:
      - joule-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  joule-network:
    driver: bridge

volumes:
  mongo-data:
