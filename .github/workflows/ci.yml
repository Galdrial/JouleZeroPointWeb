name: CI — Joule Zero Point

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # FRONTEND: TypeScript check + Unit Tests + Build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type check
        run: npx vue-tsc -b --noEmit

      - name: 🧪 Run unit tests
        run: npm run test

      - name: 🏗️ Build frontend
        run: npm run build

  # ─────────────────────────────────────────
  # BACKEND: Dependency install + Lint check
  # ─────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✅ Verify startup (dry-run syntax check)
        run: node --check index.js
